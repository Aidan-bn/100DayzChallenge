<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile card</title>
    <link rel="stylesheet" href="./styles.css">

</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-top">
                <img src="./img/profile.png" alt="profile">
            </div>
            <h1>AIdan Hunter</h1>
            <span>@aidanhunter</span>
            <div class="social-media">
                <ul>
                    <li><img src="./img/fb.svg" alt="facebook"></li>
                    <li><img src="./img/github.svg" alt="github"></li>
                    <li><img src="./img/insta.svg" alt="instagram"></li>
                    <li><img src="./img/linkedin.svg" alt=""></li>
                    <li><img src="./img/twitter.svg" alt="twitter"></li>
                </ul>
            </div>
            <p class="description">
                Lorem ipsum dolor sit amet consectetur 
                adipisicing elit. Enim, maiores quidem 
                rerum tempora voluptatum nemo recusandae 
                ex debitis dolor. Unde quae beatae 
            </p>
            <div class="btn">
                <button class="msg">Message</button>
                <button class="flw">Follow</button>
            </div>
        </div>
    </div>
</body>
</html>
